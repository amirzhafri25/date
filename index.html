<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunch Date ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    max-width:500px;
    z-index:10;
}

h1{
    color:#ff4d88;
    margin-bottom:15px;
}

p{
    color:#555;
    line-height:1.6;
    margin-bottom:10px;
}

.buttons{
    margin-top:25px;
}

#yesBtn{
    background:#ff4d88;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    transition:all 0.3s ease;
    position:relative;
    z-index:999;
}

#noBtn{
    background:#ddd;
    color:#333;
    border:none;
    padding:15px 35px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    position:absolute;
}

#success{
    display:none;
    margin-top:20px;
    color:#ff4d88;
}
</style>

</head>

<body>

<div class="card">

```
<h1>Hi Eqa ❤️</h1>

<p>Amir has something important to ask...</p>

<p>
    Would you like to have lunch with me at IKEA? 🥺
</p>

<p>
    📅 19 June 2026<br>
    🕐 1:00 PM
</p>

<div class="buttons">
    <button id="yesBtn">YES ❤️</button>
    <button id="noBtn">NO 😏</button>
</div>

<div id="success"></div>
```

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const success = document.getElementById("success");

let size = 1;

// place NO button initially
moveNo();

function moveNo(){

    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";

    // YES gets bigger EVERY TIME
    size += 0.5;

    yesBtn.style.transform = `scale(${size})`;

    if(size > 2){
        yesBtn.innerHTML = "YES ❤️❤️";
    }

    if(size > 4){
        yesBtn.innerHTML = "YES ❤️❤️❤️";
    }

    if(size > 6){
        yesBtn.innerHTML = "CLICK ME 😘";
    }

    if(size > 8){
        yesBtn.innerHTML = "JUST SAY YES 😭❤️";
    }

    // Eventually YES takes over the screen
    if(size > 10){

        yesBtn.style.position = "fixed";
        yesBtn.style.left = "0";
        yesBtn.style.top = "0";
        yesBtn.style.width = "100vw";
        yesBtn.style.height = "100vh";
        yesBtn.style.borderRadius = "0";
        yesBtn.style.fontSize = "60px";
        yesBtn.style.transform = "none";

        noBtn.style.display = "none";
    }
}

// Desktop
noBtn.addEventListener("mouseenter", moveNo);

// Mobile
noBtn.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveNo();
});

yesBtn.addEventListener("click", function(){

    document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:linear-gradient(135deg,#ffd6e7,#ffeef5);
            font-family:Arial;
            text-align:center;
        ">
            <h1 style="color:#ff4d88;">
                🎉 YAYYYY EQA SAID YES! 🎉
            </h1>

            <h2>
                ❤️ Lunch Date Confirmed ❤️
            </h2>

            <p style="font-size:24px;">
                📍 IKEA<br>
                📅 19 June 2026<br>
                🕐 1:00 PM
            </p>

            <h3>
                🍝 See you there, Eqa!
            </h3>
        </div>
    `;
});

</script>

</body>
</html>
